<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Vditor spike — Pururum</title>
<link rel="stylesheet" href="node_modules/vditor/dist/index.css">
<link rel="stylesheet" href="../quarto_viewer/static/fonts.css">
<style>
  html, body { margin: 0; height: 100%; background: #fcfcf7; }
  #host { max-width: 880px; margin: 0 auto; height: 100%; }
  /* 신록예찬 느낌만 살짝 (spike): serif body, coral headings */
  .vditor { border: none; }
  .vditor-reset, .vditor-ir .vditor-reset {
    font-family: 'Noto Serif','NanumMyeongjo','Nanum Myeongjo',serif !important;
    font-size: 16px; color: #555; background: #fcfcf7;
  }
  .vditor-reset h1, .vditor-reset h2, .vditor-reset h3 { color: #ff6f61; }
  .vditor-ir { background: #fcfcf7; }
  .vditor-toolbar { background: #f7f5ec; border-bottom: 1px solid #dcd8c8; }
</style>
</head>
<body>
<div id="host"></div>
<script src="node_modules/vditor/dist/index.min.js"></script>
<script>
const DOC = [
  '# 제목 하나',
  '',
  '본문 인라인 수식 $e^{i\\pi}+1=0$ 과 **굵게** `코드` 텍스트.',
  '',
  '$$\\int_0^1 x\\,dx = \\tfrac12$$',
  '',
  '- 리스트 하나',
  '- 리스트 둘',
  '  - 중첩 항목',
  '',
  '| A | B |',
  '| --- | --- |',
  '| 1 | 2 |',
  '',
  '::: {.callout-note}',
  '노트 본문입니다.',
  ':::',
  '',
  '끝 문단.',
].join('\n');
window.vd = new Vditor('host', {
  mode: 'ir',                    // Typora-style instant rendering
  value: DOC,
  height: '100%',
  cache: { enable: false },
  toolbar: [],                   // chrome-less: Pururum has its own toolbar
  preview: {
    math: { engine: 'KaTeX', inlineDigit: true },
    markdown: { toc: false, mark: false },
  },
  cdn: 'node_modules/vditor',    // fully offline assets
  input(v) { window.__lastMd = v; },
  after() { window.__ready = true; console.log('VDITOR READY'); },
});
</script>
</body>
</html>

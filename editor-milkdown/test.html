<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Milkdown spike</title>
<link rel="stylesheet" href="../quarto_viewer/static/fonts.css">
<link rel="stylesheet" href="../quarto_viewer/static/doc.css">
<style>
  html, body { margin: 0; height: 100%; background: #fcfcf7; }
  #host { max-width: 820px; margin: 0 auto; padding: 44px 8px 200px; }
  /* ProseMirror base requirements */
  .ProseMirror { outline: none; white-space: pre-wrap; word-wrap: break-word; caret-color: #ff6f61; }
  .ProseMirror ::selection { background: #ffd5ce; }
  .ProseMirror::selection { background: #ffd5ce; }
</style>
</head>
<body>
<div id="host"></div>
<script>
window.MathJax = {
  tex: { inlineMath: [["\\(", "\\)"]], displayMath: [["\\[", "\\]"]] },
  chtml: { fontURL: "../quarto_viewer/static/vendor/mathjax-woff" },
  startup: { typeset: false },
  options: { enableAssistiveMml: false, enableMenu: false },
};
</script>
<script src="../quarto_viewer/static/vendor/tex-chtml-full.js"></script>
<script src="dist/editor.bundle.js"></script>
<script>
function typesetSync(el, tex, display) {
  if (!(window.MathJax && MathJax.tex2chtml && MathJax.startup && MathJax.startup.document)) return false;
  try {
    const node = MathJax.tex2chtml(String(tex), { display: !!display });
    el.textContent = "";
    el.appendChild(node);
    MathJax.startup.document.updateDocument();
    return true;
  } catch (_) { return false; }
}
// Minimal fenced-div renderer standing in for the app's mdToHtml pipeline.
function renderBlock(src) {
  const esc = (s) => s.replace(/[&<]/g, (c) => (c === "&" ? "&amp;" : "&lt;"));
  const co = src.match(/^:{3,}\s*\{[^}]*\.callout-(\w+)[^}]*\}\n([\s\S]*?)\n:{3,}\s*$/);
  if (co) return '<div class="callout callout-' + co[1] + '"><div class="callout-header">' + co[1] + '</div><div class="callout-body">' + esc(co[2]) + '</div></div>';
  const ts = src.match(/^:{3,}\s*\{[^}]*\.panel-tabset[^}]*\}\n([\s\S]*?)\n:{3,}\s*$/);
  if (ts) {
    const tabs = []; let cur = null;
    for (const l of ts[1].split('\n')) {
      const h = l.match(/^##\s+(.*)$/);
      if (h) { cur = { title: h[1], body: [] }; tabs.push(cur); }
      else if (cur) cur.body.push(l);
    }
    const id = 'ts' + Math.random().toString(36).slice(2, 7);
    return '<div class="tabset"><div class="tab-bar">' +
      tabs.map((t, i) => '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" data-ts="' + id + '" data-idx="' + i + '">' + esc(t.title) + '</button>').join('') +
      '</div>' + tabs.map((t, i) => '<div class="tab-panel' + (i === 0 ? ' active' : '') + '" data-ts="' + id + '" data-idx="' + i + '">' + esc(t.body.join('\n')) + '</div>').join('') + '</div>';
  }
  return '<pre>' + esc(src) + '</pre>';
}
function renderFrontmatter(yaml) {
  const m = {};
  for (const l of yaml.split('\n')) { const kv = l.match(/^(\w[\w-]*):\s*(.*)$/); if (kv) m[kv[1]] = kv[2].replace(/^["']|["']$/g, ''); }
  return '<div class="qdoc"><div class="frontmatter"><div class="title">' + (m.title || '(제목 없음)') + '</div>' +
    (m.author ? '<div class="fm-meta"><div><div class="fm-label">Author</div><div class="fm-value">' + m.author + '</div></div></div>' : '') + '</div></div>';
}
const DOC = [
  '---',
  'title: "밀크다운 테스트"',
  'author: "리이"',
  '---',
  '',
  '# 제목 하나',
  '',
  '본문 인라인 수식 $e^{i\\pi}+1=0$ 과 **굵게** `코드` 텍스트.',
  '',
  '$$\\int_0^1 x\\,dx = \\tfrac12$$',
  '',
  '::: {.callout-note}',
  '## 노트 제목',
  '콜아웃 본문입니다.',
  ':::',
  '',
  '- 리스트 하나',
  '- 리스트 둘',
  '  - 중첩 항목',
  '',
  '::: {.panel-tabset}',
  '## 탭 A',
  '내용 A',
  '',
  '## 탭 B',
  '내용 B',
  ':::',
  '',
  '| A | B |',
  '| --- | --- |',
  '| 1 | 2 |',
  '',
  '끝 문단.',
].join('\n');
window.__popup = [];
window.ed = QVEditor.create(document.getElementById('host'), {
  doc: DOC,
  typesetSync,
  renderBlock,
  renderFrontmatter,
  editFrontmatter: (src, replace, remove) => { window.__popup.push(['fm', src]); window.__fmops = { replace, remove }; },
  editCallout: (src, replace, remove) => { window.__popup.push(['callout', src]); window.__coops = { replace, remove }; },
  editTabset: (src, replace, remove) => { window.__popup.push(['tabset', src]); window.__tsops = { replace, remove }; },
  onChange: (md) => { window.__lastMd = md; },
});
window.ed.ready.then(() => { window.__ready = true; console.log('EDITOR READY'); });
</script>
</body>
</html>

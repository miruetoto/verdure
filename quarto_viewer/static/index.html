<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pururum</title>
<link rel="stylesheet" href="fonts.css" />
<link rel="stylesheet" href="vendor/github.min.css" />
<link rel="stylesheet" href="doc.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 16px/1.75 var(--serif);
    color: var(--body); background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  /* The header lays its three regions out with ABSOLUTE positioning, not flex.
     Flexbox spread the toolbar buttons unpredictably in the real WKWebView
     (fine in headless) — absolute positions can't diverge. */
  header {
    position: relative; height: 48px; flex: none;
    background: var(--toolbar);
    border-bottom: 1px solid var(--border);
    -webkit-user-select: none; user-select: none;
  }
  #tb-left, #hdr-right {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center; gap: 3px;
  }
  #tb-left { left: 10px; }
  #hdr-right { right: 8px; }
  /* icon toolbar buttons */
  .tbtn {
    position: relative; display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; flex: none; padding: 0; cursor: pointer;
    color: var(--muted); background: transparent;
    border: 1px solid transparent; border-radius: 8px;
    transition: background .12s, color .12s, transform .06s;
  }
  .tbtn:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
  .tbtn.on { background: var(--accent); color: #fff; }
  .tbtn:active { transform: translateY(.5px); }
  .tbtn svg { width: 17px; height: 17px; }
  /* Source + help are a matched pair of round outlined buttons (balanced).
     Source fills coral with a glow when engaged so its on/off state reads. */
  #btn-source, #btn-help { border-radius: 50%; border: 1px solid var(--border-strong); color: var(--body); }
  #btn-source:hover, #btn-help:hover { border-color: var(--accent); background: transparent; color: var(--accent); }
  #btn-source.on {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  /* tooltip */
  .tbtn::after {
    content: attr(data-tip); position: absolute; top: 38px; left: 50%;
    transform: translateX(-50%) translateY(-3px); white-space: nowrap;
    font: 500 11px/1 -apple-system, system-ui, sans-serif; color: #f4f2e8;
    background: #2b2b26; padding: 5px 8px; border-radius: 6px;
    opacity: 0; pointer-events: none; transition: opacity .12s, transform .12s; z-index: 60;
  }
  .tbtn:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); transition-delay: .35s; }
  .tsep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; flex: none; }
  /* zoom control (top-right toolbar) */
  #zoom-ctl {
    display: inline-flex; align-items: center; flex: none;
    border: 1px solid var(--border-strong); border-radius: 8px; overflow: hidden;
    background: var(--bg);
  }
  #zoom-ctl button {
    border: none; background: transparent; cursor: pointer; color: var(--body);
    font: 600 12.5px/1 -apple-system, system-ui, sans-serif; padding: 0;
    height: 26px; transition: background .12s, color .12s;
  }
  #zoom-ctl button:hover { background: var(--hover); color: var(--accent); }
  #btn-zoom-out, #btn-zoom-in { width: 26px; font-size: 16px; }
  #btn-zoom-reset { min-width: 44px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  /* Document zoom via CSS `zoom` on the scroller. This scales the content AND
     CodeMirror's selection/cursor layer as a single unit (both live inside
     .cm-scroller), so they can never drift apart — unlike font-size scaling,
     which changes line heights that CM caches and fails to re-measure, leaving
     the selection/caret stranded at stale coordinates (that misalignment showed
     up only in the real WKWebView). CM 6.43 compensates for `zoom` in its
     click→position math, so pointer mapping stays correct. Objects (.qdoc) and
     MathJax scale with the zoom too, so they stay at their base font-size. */
  .cm-scroller { zoom: var(--qv-zoom, 1); }
  /* Left toolbar group pinned to the sidebar's width (232px + 1px border), so
     the tab strip begins exactly on the sidebar/editor split line below. */
  #status { color: var(--muted); font-size: 12px; white-space: nowrap; flex: none; margin-left: 6px; }
  #reload-btn {
    display: none; align-items: center; gap: 5px; flex: none; margin-left: 4px;
    font: 500 11.5px/1 -apple-system, system-ui, sans-serif;
    color: #fff; background: var(--caution); border: none;
    border-radius: 7px; padding: 6px 9px; cursor: pointer;
  }
  #reload-btn:hover { filter: brightness(1.05); }
  #reload-btn.show { display: inline-flex; }

  /* ---- tab strip ---- */
  /* Retired: the sidebar's 열린 문서 list does everything the horizontal
     pills did (switch, close, dirty dot), so the strip was pure duplication.
     renderTabs() still maintains the hidden element — flip this to bring the
     pills back. */
  #tabs { display: none; }
  #tabs::-webkit-scrollbar { display: none; }
  /* Tabs are floating pills, vertically centered in the toolbar. (The previous
     browser-style "open bottom" tab never actually reached the toolbar's bottom
     border, so its transparent bottom edge floated mid-air and looked crooked.) */
  .tab {
    display: inline-flex; align-items: center; gap: 6px; flex: none;
    max-width: 220px; height: 30px; padding: 0 6px 0 12px; cursor: default;
    font: 500 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--muted);
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; user-select: none;
  }
  .tab:hover { background: color-mix(in srgb, var(--hover) 70%, transparent); }
  .tab.active {
    color: var(--fg); background: var(--bg);
    border-color: var(--border);
  }
  .tab-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tab.dirty .tab-name::before { content: "• "; color: var(--accent); font-weight: 700; }
  .tab.external .tab-name::after { content: " ⚠"; color: var(--caution); }
  .tab-close {
    flex: none; width: 17px; height: 17px; border: none; border-radius: 5px;
    background: transparent; color: var(--muted); cursor: pointer; padding: 0;
    font-size: 14px; line-height: 15px; opacity: .55;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--border); color: var(--fg); }

  #main { flex: 1; min-height: 0; display: flex; }
  #editor-host { flex: 1; min-height: 0; min-width: 0; display: flex; }
  #editor-host .cm-editor { flex: 1; }

  /* ---- sidebar file explorer ---- */
  #sidebar {
    width: var(--sidebar-w, 260px); flex: none; display: flex; flex-direction: column;
    background: color-mix(in srgb, var(--toolbar) 55%, var(--bg));
    border-right: 1px solid var(--border); overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #sidebar[hidden] { display: none; }
  /* Drag handle between sidebar and editor: resizes the sidebar. */
  #sidebar-resizer {
    flex: none; width: 7px; margin-left: -4px; cursor: col-resize; z-index: 4;
    position: relative; background: transparent;
  }
  #sidebar-resizer:hover::after, #sidebar-resizer.dragging::after {
    content: ""; position: absolute; left: 2.5px; top: 0; bottom: 0; width: 2px;
    border-radius: 2px; background: var(--accent); opacity: .45;
  }
  html.qv-web #sidebar-resizer { display: none; }
  /* Collapsed sidebar: dragging below the minimum snaps it closed; the handle
     stays at the left edge (drag right or double-click to reopen). */
  html.qv-sb-hidden #sidebar { display: none; }
  html.qv-sb-hidden #sidebar-resizer { margin-left: 0; }
  /* web: the sidebar shows RECENT DOCS (localStorage); folder access is a
     mac-app feature, so the ＋(폴더 열기) button is hidden and 열기/저장 are
     visually sealed (clicking explains the mac app). */
  html.qv-web #sidebar-addbtn { opacity: .35; }
  html.qv-web #btn-open, html.qv-web #btn-save { opacity: .35; }
  /* No border-bottom here: it sat at a height nothing on the editor side
     matched, so the top-left junction showed three misaligned lines. */
  #sidebar-head {
    display: flex; align-items: center; gap: 6px; flex: none;
    padding: 12px 8px 6px 12px;
  }
  #sidebar-root {
    flex: 1; min-width: 0; font: 700 11px/1.2 -apple-system, system-ui, sans-serif;
    color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #sidebar-openbtn {
    flex: none; border: 1px solid var(--border-strong); border-radius: 6px;
    background: var(--bg); color: var(--muted); cursor: pointer;
    font: 500 10.5px/1 -apple-system, system-ui, sans-serif; padding: 4px 7px;
  }
  #sidebar-openbtn:hover { background: var(--hover); color: var(--fg); }
  #sidebar-addbtn {
    flex: none; width: 20px; height: 20px; padding: 0; cursor: pointer;
    border: none; border-radius: 5px; background: transparent; color: var(--muted);
    font: 500 13px/1 -apple-system, system-ui, sans-serif;
  }
  #sidebar-addbtn:hover { background: var(--hover); color: var(--fg); }
  #sidebar-tree { flex: 1; overflow: auto; padding: 4px 0 12px; }
  /* vertical tabs — open documents list (Obsidian-style, above the explorer) */
  #side-tabs-head, .side-sec-head {
    padding: 10px 12px 4px; font: 600 11px/1 -apple-system, sans-serif;
    color: var(--muted); letter-spacing: .04em;
  }
  #side-tabs { flex: none; max-height: 40%; overflow: auto; padding-bottom: 6px; }
  .side-tab {
    /* Left pad 24px: one clear indent step under the 12px section header
       (flush looked like a sibling of the header), matching the explorer
       tree's depth-1 rows (~23px). */
    display: flex; align-items: center; gap: 6px; padding: 4px 12px 4px 24px;
    font: 13px/1.4 -apple-system, sans-serif; color: var(--body);
    cursor: pointer; white-space: nowrap; overflow: hidden;
  }
  .side-tab:hover { background: var(--hover); }
  .side-tab.active {
    background: #f6ede8; color: var(--fg);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  .side-tab .st-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .side-tab .st-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    flex: none; visibility: hidden;
  }
  .side-tab.dirty .st-dot { visibility: visible; }
  .side-tab .st-close {
    border: none; background: none; color: var(--muted); cursor: pointer;
    font: 13px/1 -apple-system, sans-serif; padding: 0 2px; border-radius: 4px;
    visibility: hidden; flex: none;
  }
  .side-tab:hover .st-close { visibility: visible; }
  .side-tab .st-close:hover { color: var(--fg); background: var(--border); }
  /* Workspace roots (multi-folder): bold header row with a close ×. */
  .tree-root-sec { margin-bottom: 2px; }
  .tree-root-head {
    display: flex; align-items: center; gap: 4px; cursor: default;
    padding: 4px 8px 4px 6px; user-select: none;
    font: 700 11.5px/1.3 -apple-system, system-ui, sans-serif; color: var(--fg);
  }
  .tree-root-head .tn { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-root-close {
    flex: none; width: 17px; height: 17px; border: none; border-radius: 5px; padding: 0;
    background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; opacity: 0;
  }
  .tree-root-head:hover .tree-root-close { opacity: .8; }
  .tree-root-close:hover { background: var(--border); color: var(--fg); opacity: 1; }
  .sidebar-empty {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 40px 16px; text-align: center; color: var(--muted);
    font: 500 12px/1.5 -apple-system, system-ui, sans-serif;
  }
  .sidebar-empty button {
    border: 1px solid var(--border-strong); border-radius: 7px; background: var(--bg);
    color: var(--fg); cursor: pointer; font: 500 12px/1 inherit; padding: 7px 12px;
  }
  .sidebar-empty button:hover { background: var(--hover); }
  /* Sealed on web: same button, dimmed; clicking flashes the 맥 앱 toast. */
  .sidebar-empty button.locked { opacity: .5; cursor: default; }
  .sidebar-empty button.locked:hover { background: var(--bg); }
  .tree-row {
    display: flex; align-items: center; gap: 4px; height: 27px; cursor: default;
    font: 500 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--fg);
    white-space: nowrap; overflow: hidden; padding-right: 8px; border-radius: 5px;
    margin: 0 4px;
  }
  .tree-row:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .tree-row.active { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
  /* Disclosure chevron: pure CSS (border triangle) — bigger than the old text
     "▸" and renders identically in every engine. Rotates when open. */
  .tw {
    width: 18px; height: 18px; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .tw.has::before {
    content: ""; display: block; width: 6.5px; height: 6.5px;
    border-right: 1.8px solid var(--muted); border-bottom: 1.8px solid var(--muted);
    transform: rotate(-45deg); transition: transform .13s ease;
  }
  .tw.has.open::before { transform: rotate(45deg) translateY(-2px); }
  .tree-row .ti { flex: none; opacity: .8; }
  .tree-row .tn { overflow: hidden; text-overflow: ellipsis; }
  .tree-row.dir { color: var(--fg); }

  /* ---- spreadsheet table editor modal ---- */
  .tbl-panel {
    background: var(--toolbar); border: 1px solid var(--border-strong);
    border-radius: 14px; padding: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
    max-width: min(92vw, 900px); max-height: 84vh; display: flex; flex-direction: column; gap: 8px;
  }
  .tbl-tools, .tbl-foot { display: flex; align-items: center; gap: 6px; }
  .tbl-center { font: 500 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--fg); display: inline-flex; align-items: center; gap: 5px; }
  .tbl-hint { font: 400 11px/1.3 -apple-system, system-ui, sans-serif; color: var(--muted); }
  /* Uniform object delete badge: hover any object (image/table/tabset) → × */
  .qv-obj { position: relative; }
  .qv-delx {
    position: absolute; top: 4px; right: 4px; z-index: 6;
    width: 22px; height: 22px; padding: 0; border: none; border-radius: 50%;
    background: #ff0039; color: #fff; font: 700 15px/22px -apple-system, system-ui, sans-serif;
    text-align: center; cursor: pointer; opacity: 0; transition: opacity .12s;
    box-shadow: 0 1px 4px rgba(0,0,0,.3);
  }
  .qv-obj:hover .qv-delx { opacity: 1; }
  .qv-delx:hover { background: #d0002f; }
  /* live rendered preview inside object modals ("실제 들어가는 모양") */
  .obj-preview {
    border: 1px solid var(--border-strong); border-radius: 10px; background: var(--bg);
    padding: 6px 12px 10px; max-height: 34vh; overflow: auto;
  }
  .obj-preview-label {
    font: 600 11px/1 -apple-system, system-ui, sans-serif; color: var(--muted);
    text-transform: uppercase; letter-spacing: .03em; margin: 2px 0 6px;
  }
  .obj-preview .qdoc > *:first-child { margin-top: 0; }
  .obj-preview .qdoc > *:last-child { margin-bottom: 0; }
  /* callout editor popup */
  .callout-panel { width: min(92vw, 560px); }
  .co-types { display: inline-flex; flex-wrap: wrap; gap: 5px; }
  .co-types button {
    display: inline-flex; align-items: center; gap: 5px; cursor: pointer;
    padding: 6px 11px; border-radius: 8px; border: 1px solid var(--border-strong);
    background: var(--bg); color: var(--fg); font: 500 12.5px/1 -apple-system, system-ui, sans-serif;
    transition: background .12s, border-color .12s;
  }
  .co-types button:hover { background: var(--hover); }
  .co-types button.on { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .co-types .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--d); flex: none; }
  .co-title {
    border: 1px solid var(--border-strong); border-radius: 8px; background: var(--bg); color: var(--fg);
    font: 500 13.5px/1.4 -apple-system, system-ui, sans-serif; padding: 8px 10px; outline: none;
  }
  .co-title:focus { border-color: var(--accent); }
  /* code editor popup */
  /* image editor popup */
  .img-panel { width: min(92vw, 460px); }
  .img-preview {
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border: 1px solid var(--border-strong); border-radius: 10px;
    padding: 10px; min-height: 120px; max-height: 46vh; overflow: hidden;
  }
  .img-preview img { max-width: 100%; max-height: 42vh; object-fit: contain; border-radius: 3px; }
  /* annotation: base <img> with a transparent draw canvas exactly on top */
  .img-canvas-wrap { position: relative; display: inline-block; line-height: 0; max-width: 100%; }
  .img-canvas-wrap img { display: block; }
  #img-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; border-radius: 3px; }
  .img-tools { flex-wrap: wrap; gap: 6px; }
  .img-tools .draw-colors, .img-tools .draw-sizes { display: inline-flex; gap: 4px; }
  .img-row { display: flex; align-items: center; gap: 10px; }
  .img-label {
    font: 600 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--muted);
    width: 2.6em; flex: none;
  }
  .img-aligns { display: inline-flex; gap: 4px; }
  .img-aligns button {
    width: 34px; height: 30px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border-strong); background: var(--bg); color: var(--fg);
    font-size: 15px; line-height: 1; transition: background .12s, color .12s, border-color .12s;
  }
  .img-aligns button:hover { background: var(--hover); }
  .img-aligns button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  #img-width { flex: 1; accent-color: var(--accent); }
  .img-wval { font: 600 12.5px/1 var(--mono, monospace); color: var(--fg); width: 3.4em; text-align: right; }
  .tbl-grid { overflow: auto; flex: 1; min-height: 0; }
  .tbl-grid table { border-collapse: collapse; }
  .tbl-grid td { border: 1px solid var(--border-strong); padding: 0; background: var(--bg); }
  .tbl-grid tr.hdr td { background: color-mix(in srgb, var(--toolbar) 70%, var(--bg)); }
  .tbl-grid tr.hdr input { font-weight: 700; }
  .tbl-grid input {
    border: none; outline: none; background: transparent; color: var(--fg);
    font: 500 13.5px/1.4 -apple-system, system-ui, sans-serif; padding: 8px 10px;
    min-width: 7em; width: 100%; box-sizing: border-box;
  }
  .tbl-grid input:focus { background: color-mix(in srgb, var(--accent) 8%, var(--bg)); }
  .tbl-grid tr.aligns td { text-align: center; background: color-mix(in srgb, var(--toolbar) 45%, var(--bg)); }
  .tbl-grid tr.aligns button {
    border: none; background: transparent; cursor: pointer; width: 100%;
    font: 600 12px/1 -apple-system, system-ui, sans-serif; color: var(--muted); padding: 4px 0;
  }
  .tbl-grid tr.aligns button:hover { color: var(--accent); }
  /* ---- tabset editor popup ---- */
  .tabset-panel { width: min(90vw, 760px); }
  .tabset-head { display: flex; align-items: flex-end; gap: 8px; border-bottom: 1px solid var(--border-strong); }
  .tabset-addtab { flex: none; margin-bottom: 4px; }
  .tabset-tabbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 2px 0; flex: 1; margin-bottom: -1px; }
  .tabset-tabbar .tstab {
    display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
    border: 1px solid var(--border-strong); border-radius: 8px 8px 0 0;
    background: color-mix(in srgb, var(--toolbar) 60%, var(--bg)); color: var(--muted);
    padding: 6px 8px 6px 10px; font: 500 12.5px/1 -apple-system, system-ui, sans-serif;
  }
  .tabset-tabbar .tstab.active { background: var(--bg); color: var(--fg); border-bottom-color: var(--bg); }
  .tabset-tabbar .tstab input {
    border: none; background: transparent; color: inherit; font: inherit;
    width: 6em; min-width: 3em; outline: none; padding: 0;
  }
  .tabset-tabbar .tstab .tsx {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    width: 16px; height: 16px; border-radius: 4px; font-size: 13px; line-height: 1; padding: 0;
  }
  .tabset-tabbar .tstab .tsx:hover { background: var(--border); color: var(--fg); }
  .tabset-body {
    flex: 1; min-height: 200px; resize: vertical; box-sizing: border-box; width: 100%;
    border: 1px solid var(--border-strong); border-radius: 0 8px 8px 8px; padding: 10px 12px;
    background: var(--bg); color: var(--fg); font: 13.5px/1.6 var(--mono); outline: none;
  }
  .tabset-body:focus { border-color: var(--accent); }

  /* ---- insert dropdown menu ---- */
  .menu {
    position: fixed; z-index: 100; min-width: 172px;
    background: var(--bg); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 5px; box-shadow: 0 10px 30px rgba(0,0,0,.16);
    font: 500 13px/1 -apple-system, system-ui, sans-serif;
  }
  .menu[hidden] { display: none; }
  .menu button {
    display: flex; align-items: center; gap: 9px; width: 100%;
    background: transparent; border: none; border-radius: 6px;
    padding: 7px 10px; cursor: pointer; color: var(--fg); text-align: left; font: inherit;
  }
  .menu button:hover { background: var(--hover); }
  .menu .mi {
    width: 18px; height: 18px; flex: none; color: var(--body);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .menu .mi svg { width: 17px; height: 17px; }
  .menu button:hover .mi { color: var(--accent); }
  .menu .dot { width: 10px; height: 10px; border-radius: 3px; background: var(--d); flex: none; margin: 0 3px; }
  .menu-sep { height: 1px; background: var(--border); margin: 5px 4px; }
  .menu-label { font-size: 11px; color: var(--muted); padding: 5px 10px 3px; }

  /* ---- 그림판 팝업 ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 200; display: flex;
    align-items: center; justify-content: center;
    background: rgba(30,28,24,.38); backdrop-filter: blur(2px);
  }
  .overlay[hidden] { display: none; }
  .draw-panel {

  }
  .draw-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .draw-colors { display: flex; gap: 5px; }
  .draw-colors .sw {
    width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer;
    background: var(--c); border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border) inset;
  }
  .draw-colors .sw.active { border-color: var(--fg); }
  .draw-sizes { display: flex; gap: 3px; }
  .dtool, .draw-sizes button {
    font: 500 12px/1 -apple-system, system-ui, sans-serif; color: var(--fg);
    background: var(--bg); border: 1px solid var(--border-strong);
    border-radius: 7px; padding: 7px 10px; cursor: pointer; white-space: nowrap;
  }
  .dtool:hover, .draw-sizes button:hover { background: var(--hover); }
  .draw-sizes button.active, #draw-eraser.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .dtool.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dtool.primary:hover { filter: brightness(1.05); background: var(--accent); }
  .dtool.danger { color: var(--caution); border-color: color-mix(in srgb, var(--caution) 45%, var(--border-strong)); }
  .dtool.danger:hover { background: color-mix(in srgb, var(--caution) 12%, var(--bg)); }
  .draw-tools .spacer { flex: 1; }
  .draw-surface {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; line-height: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 22px 22px; background-position: -1px -1px; background-color: #fff;
  }
  #draw-canvas { display: block; touch-action: none; cursor: crosshair; max-width: 88vw; height: auto; }


  /* Off-screen container used only to build the PDF export. */
  #export-doc { position: absolute; left: -99999px; top: 0; width: 820px; }

  /* Widget content must not inherit CodeMirror's pre-wrap: the \n text nodes in
     generated HTML (e.g. between a table's thead/tbody) would render as gaps. */
  .qv-block { white-space: normal; }

  /* Editor block-math widget layout (sizing comes from doc.css .math rules). */
  .qv-math-block { text-align: center; margin: 2px 0; }

  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(10px);

  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<script>
// ── Tauri adapter ──────────────────────────────────────────────────────────
// When running inside the Tauri (Rust) shell, expose the same window.pywebview
// .api surface the frontend already uses, mapped to Rust `invoke` commands.
// Inert under pywebview (window.__TAURI__ is undefined there).
if (window.__TAURI__) {
  const invoke = window.__TAURI__.core.invoke;
  const listen = window.__TAURI__.event.listen;
  window.pywebview = { api: {
    get_state: () => invoke("get_state"),
    read_path: (path) => invoke("read_path", { path }),
    help_doc: () => invoke("help_doc"),
    list_dir: (path) => invoke("list_dir", { path }),
    open_file: () => invoke("open_file"),
    open_folder: () => invoke("open_folder"),
    set_active: (path) => invoke("set_active", { path: path || "" }),
    set_folder: (path) => invoke("set_folder", { path: path || "" }),
    track: (paths) => invoke("track", { paths: paths || [] }),
    poll: () => invoke("poll"),
    save: (text) => invoke("save_doc", { text }),

// a saved file). Only the fonts actually referenced are fetched.
async function inlineFontUrls(css) {
  const urls = [...new Set([...css.matchAll(/url\((['"]?)([^'")]+\.(?:woff2|woff|ttf|otf))\1\)/g)].map((m) => m[2]))];
  for (const u of urls) {
    try {
      const bytes = new Uint8Array(await (await fetch(u)).arrayBuffer());
      let bin = ""; const CH = 0x8000;
      for (let i = 0; i < bytes.length; i += CH) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
      const ext = u.split(".").pop().toLowerCase();
      const mime = ext === "ttf" ? "font/ttf" : ext === "otf" ? "font/otf" : ext === "woff2" ? "font/woff2" : "font/woff";
      const dataUrl = "data:" + mime + ";base64," + btoa(bin);
      for (const q of ["'", '"', ""]) css = css.split("url(" + q + u + q + ")").join("url(" + q + dataUrl + q + ")");

  }

  activeTitle = t.title;

    state: freshStateParked(st.text), savedText: st.text,
    scrollTop: 0, external: false, pending: null,

  syncTrack();
  switchTo(t.id);

function closeTab(id) {
  const idx = tabs.findIndex((t) => t.id === id);
  if (idx < 0) return;

  if (isDirty(t) && !confirm("저장되지 않은 변경사항이 있습니다:\n" + t.title + "\n\n닫을까요?")) return;

  if (activeId === id) {
    activeId = null;  // so switchTo doesn't try to persist the removed tab
    const next = tabs[idx] || tabs[idx - 1] || null;
    if (next) switchTo(next.id);

    renderTabs();

/* ============ Autosave (Apple Notes-style) ============ */
// An untitled document gets a real file in ~/Documents/Pururum as soon as it

  if (t.path) return true;

  if (r && r.saved) {
    t.savedText = text; t.path = r.path; t.title = r.title; t.auto = true;
    activeTitle = r.title; syncTrack(); renderTabs(); flashAutosaved();

/* ============ Insert blocks (Quarto syntax) ============ */
// A « » token marks where the cursor lands after insertion (stripped before insert).
const CURSOR = "\u00ab\u00bb";
const SNIPPETS = {
  // No «» marker: the table is a fixed widget edited through cell inputs, so
  // the document caret must land AFTER it, never invisibly inside the pipes.
  "table": "| 열 1 | 열 2 |\n| --- | --- |\n|  |  |\n",
  "tabset": "::: {.panel-tabset}\n\n## 탭 1\n\n«»\n\n## 탭 2\n\n\n:::\n",
  "code": "```«»\n\n```\n",
  "callout-note": "::: {.callout-note}\n«»\n:::\n",
  "callout-tip": "::: {.callout-tip}\n«»\n:::\n",
  "callout-warning": "::: {.callout-warning}\n«»\n:::\n",
  "callout-caution": "::: {.callout-caution}\n«»\n:::\n",
  "callout-important": "::: {.callout-important}\n«»\n:::\n",
};
function insertBlock(key) {
  if (key === "callout") { if (ed) newCalloutViaEditor(); return; }
  if (key === "table") { if (ed) newTableViaEditor(); return; }
  if (key === "tabset") { if (ed) newTabsetViaEditor(); return; }
  const snip = SNIPPETS[key]; if (!snip || !ed) return;   // code → plain inline snippet
  const view = ed.view;
  const sel = view.state.selection.main;
  // Block markup needs to start on its own line (blank line above if mid-text).
  const line = view.state.doc.lineAt(sel.from);
  const before = view.state.doc.sliceString(line.from, sel.from);
  const lead = before.trim() === "" ? "" : "\n\n";
  const marker = snip.indexOf(CURSOR);
  const clean = snip.replace(CURSOR, "");
  const caret = sel.from + lead.length + (marker >= 0 ? marker : clean.length);
  view.dispatch({
    changes: { from: sel.from, to: sel.to, insert: lead + clean },
    selection: { anchor: caret },
    scrollIntoView: true,
  });
  view.focus();
}

function treeIcon(isDir) {

    ? '<svg class="ti" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1.5 4.5 1.5 12.5a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H7.5l-1.3-1.5H2.5a1 1 0 0 0-1 1Z"/></svg>'
    : '<svg class="ti" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3.5 1.5h6l3 3v9a1 1 0 0 1-1 1h-8a1 1 0 0 1-1-1V2.5a1 1 0 0 1 1-1Z"/><path d="M9.3 1.6V4.7h3.1"/></svg>';
}
function makeTreeNode(entry, depth) {
  const wrap = document.createElement("div");
  const row = document.createElement("div");
  row.className = "tree-row " + (entry.is_dir ? "dir" : "file");
  row.dataset.path = entry.path;
  row.style.paddingLeft = 6 + depth * 13 + "px";
  const tw = document.createElement("span"); tw.className = entry.is_dir ? "tw has" : "tw";
  const name = document.createElement("span"); name.className = "tn"; name.textContent = entry.name;
  row.appendChild(tw);
  row.insertAdjacentHTML("beforeend", treeIcon(entry.is_dir));
  row.appendChild(name);
  wrap.appendChild(row);
  if (entry.is_dir) {
    const kids = document.createElement("div"); kids.hidden = true; wrap.appendChild(kids);
    let loaded = false;
    row.onclick = async () => {
      if (!kids.hidden) { kids.hidden = true; tw.classList.remove("open"); return; }
      if (!loaded) {
        try {
          const sub = await api().list_dir(entry.path);
          for (const c of sub.entries || []) kids.appendChild(makeTreeNode(c, depth + 1));
          loaded = true;
        } catch (_) {}
      }
      kids.hidden = false; tw.classList.add("open");
    };
  } else {
    row.onclick = () => { (async () => { try { addTab(await api().read_path(entry.path)); markActiveInTree(); } catch (_) {} })(); };
  }
  return wrap;
}
// Add a folder as a workspace root (dedup) and re-render the tree.
async function openFolder(path) {
  if (!path) return;
  if (!rootFolders.some((r) => r.path === path)) {
    rootFolders.push({ path, name: null, collapsed: false });
    try { api().set_folder(path); } catch (_) {}  // newest root = Save default
  }
  await renderRoots();
}
function closeRoot(path) {
  rootFolders = rootFolders.filter((r) => r.path !== path);
  const last = rootFolders[rootFolders.length - 1];
  try { api().set_folder(last ? last.path : ""); } catch (_) {}
  renderRoots();
}
async function renderRoots() {
  const tree = document.getElementById("sidebar-tree");
  tree.innerHTML = "";
  if (!rootFolders.length) { renderEmptySidebar(); return; }
  for (const r of rootFolders) {
    let info;
    try { info = await api().list_dir(r.path); } catch (_) { continue; }
    r.name = info.name || r.path;
    const sec = document.createElement("div"); sec.className = "tree-root-sec";
    const head = document.createElement("div"); head.className = "tree-root-head";
    const tw = document.createElement("span"); tw.className = "tw has" + (r.collapsed ? "" : " open");
    const nm = document.createElement("span"); nm.className = "tn"; nm.textContent = r.name; nm.title = r.path;
    const x = document.createElement("button"); x.className = "tree-root-close"; x.textContent = "×"; x.title = "폴더 닫기";
    x.onclick = (e) => { e.stopPropagation(); closeRoot(r.path); };
    head.append(tw, nm, x);
    sec.appendChild(head);
    const kids = document.createElement("div"); kids.hidden = r.collapsed;
    for (const e of info.entries || []) kids.appendChild(makeTreeNode(e, 0));
    sec.appendChild(kids);
    head.onclick = () => { r.collapsed = !r.collapsed; kids.hidden = r.collapsed; tw.classList.toggle("open", !r.collapsed); };
    tree.appendChild(sec);
  }
  markActiveInTree();
}
// Web sidebar mirrors the mac layout exactly — same 탐색기 empty state; the

window.QV = {
  openPath(path) {
    if (!ed) { pendingOpens.push(path); return; }
    (async () => { try { addTab(await api().read_path(path)); } catch (_) {} })();
  },
  openFolder(path) { if (ed) openFolder(path); else pendingOpens.push({ folder: path }); },
  newBlank() { if (ed) doNew(); },
};

// Attachment paths are usually short ("attachments/….png"), but the web build
// may return a data: URI (image embedded in the document) — describe, don't dump.
function describePath(p) {
  if (!p) return p;
  if (p.startsWith("data:")) return "문서에 직접 포함됨";
  // macOS stores filenames decomposed (NFD); recompose so Hangul reads normally.
  try { p = p.normalize("NFC"); } catch (_) {}
  return p;
}
/* ============ Spreadsheet table editor (modal) ============ */
// Edit in a plain-HTML grid completely outside CodeMirror (no focus wars),
// then 적용 serializes back to GFM markdown. Opened by clicking a rendered
// table, or by 삽입 → 표 for a new one.
const tableModal = document.getElementById("table-modal");
const ALIGN_GLYPH = { left: "⇤", center: "↔", right: "⇥", null: "—" };
let tblState = null;   // { m, onApply }
function openTableEditor(model, centered, caption, onApply, onDelete) {
  tblState = { m: model, onApply, onDelete };
  document.getElementById("tbl-centered").checked = !!centered;
  document.getElementById("tbl-caption").value = caption || "";
  document.getElementById("tbl-delete").hidden = !onDelete;
  renderTblGrid();
  tableModal.removeAttribute("hidden");
  requestAnimationFrame(() => { const i = document.querySelector("#tbl-grid input"); if (i) { i.focus(); i.select(); } });
}
function closeTableEditor() { tableModal.setAttribute("hidden", ""); tblState = null; if (ed) ed.focus(); }
function collectTblGrid() {
  // Read every grid input back into the model before structural ops / apply.
  const m = tblState.m;
  tableModal.querySelectorAll("input[data-r]").forEach((inp) => {
    const r = +inp.dataset.r, c = +inp.dataset.c;
    if (r === 0) m.header[c] = inp.value;
    else (m.rows[r - 1] || (m.rows[r - 1] = []))[c] = inp.value;
  });
  return m;
}
function updateTblPreview() {
  if (!tblState) return;
  const m = collectTblGrid();
  const centered = document.getElementById("tbl-centered").checked;
  const cap = document.getElementById("tbl-caption").value.trim();
  let src = QVEditor.serializeTable(m);
  if (centered) src = "::: {.center}\n" + src + "\n:::";
  if (cap) src += "\n\n: " + cap;
  const el = document.getElementById("tbl-preview");
  el.innerHTML = mdToHtml(src);
  enhance(el);
}
function renderTblGrid(focusR, focusC) {
  const m = tblState.m;
  const cols = Math.max(m.header.length, 1);
  const host = document.getElementById("tbl-grid");
  host.innerHTML = "";
  const tb = document.createElement("table");
  const mkRow = (vals, r, cls) => {
    const tr = document.createElement("tr"); if (cls) tr.className = cls;
    for (let c = 0; c < cols; c++) {
      const td = document.createElement("td");
      const inp = document.createElement("input");
      inp.value = vals[c] ?? ""; inp.dataset.r = r; inp.dataset.c = c;
      inp.style.textAlign = m.aligns[c] || "left";   // header + body follow the column alignment
      inp.addEventListener("focus", () => { tblState.last = { r, c }; });
      inp.addEventListener("input", updateTblPreview);
      td.appendChild(inp); tr.appendChild(td);
    }
    return tr;
  };
  tb.appendChild(mkRow(m.header, 0, "hdr"));
  const al = document.createElement("tr"); al.className = "aligns";
  for (let c = 0; c < cols; c++) {
    const td = document.createElement("td");
    const b = document.createElement("button");
    b.type = "button"; b.textContent = ALIGN_GLYPH[m.aligns[c] ?? "null"] + " 정렬";
    b.title = "이 열 정렬 바꾸기";
    b.onclick = () => {
      // Update in place (no full grid rebuild): cycle the glyph and re-align this
      // column's cells. Rebuilding here reset focus and felt like it needed two
      // clicks.
      const order = [null, "left", "center", "right"];
      m.aligns[c] = order[(order.indexOf(m.aligns[c] ?? null) + 1) % order.length];
      b.textContent = ALIGN_GLYPH[m.aligns[c] ?? "null"] + " 정렬";
      tableModal.querySelectorAll(`#tbl-grid input[data-c="${c}"]`).forEach((inp) => { inp.style.textAlign = m.aligns[c] || "left"; });
      updateTblPreview();
    };
    td.appendChild(b); al.appendChild(td);
  }
  tb.appendChild(al);
  m.rows.forEach((row, i) => tb.appendChild(mkRow(row, i + 1)));
  host.appendChild(tb);
  if (focusR != null) {
    const inp = host.querySelector(`input[data-r="${focusR}"][data-c="${Math.min(focusC ?? 0, cols - 1)}"]`);
    if (inp) inp.focus();
  }
  updateTblPreview();
}
document.getElementById("tbl-addrow").onclick = () => {
  const m = collectTblGrid(); const at = tblState.last ? Math.max(0, tblState.last.r) : m.rows.length;
  m.rows.splice(at, 0, Array(m.header.length).fill(""));
  renderTblGrid(at + 1, tblState.last?.c ?? 0);
};
document.getElementById("tbl-delrow").onclick = () => {
  const m = collectTblGrid();
  if (m.rows.length <= 1) return;
  const at = Math.min(Math.max((tblState.last?.r ?? m.rows.length) - 1, 0), m.rows.length - 1);
  m.rows.splice(at, 1);
  renderTblGrid(Math.min(at + 1, m.rows.length), tblState.last?.c ?? 0);
};
document.getElementById("tbl-addcol").onclick = () => {
  const m = collectTblGrid(); const at = (tblState.last?.c ?? m.header.length - 1) + 1;
  m.header.splice(at, 0, ""); m.aligns.splice(at, 0, null);
  m.rows.forEach((r) => r.splice(at, 0, ""));
  renderTblGrid(tblState.last?.r ?? 0, at);
};
document.getElementById("tbl-delcol").onclick = () => {
  const m = collectTblGrid();
  if (m.header.length <= 1) return;
  const at = Math.min(tblState.last?.c ?? m.header.length - 1, m.header.length - 1);
  m.header.splice(at, 1); m.aligns.splice(at, 1);
  m.rows.forEach((r) => r.splice(at, 1));
  renderTblGrid(tblState.last?.r ?? 0, Math.max(0, at - 1));
};
document.getElementById("tbl-delete").onclick = () => {
  const done = tblState.onDelete; closeTableEditor(); if (done) done();
};
document.getElementById("tbl-centered").addEventListener("change", updateTblPreview);
document.getElementById("tbl-caption").addEventListener("input", updateTblPreview);
document.getElementById("tbl-cancel").onclick = closeTableEditor;
document.getElementById("tbl-apply").onclick = () => {
  const m = collectTblGrid();
  const centered = document.getElementById("tbl-centered").checked;
  const caption = document.getElementById("tbl-caption").value.trim();
  const text = QVEditor.serializeTable(m);
  const done = tblState.onApply;
  closeTableEditor();
  done(text, centered, caption);
};
tableModal.addEventListener("mousedown", (e) => { if (e.target === tableModal) closeTableEditor(); });
document.addEventListener("keydown", (e) => {
  if (tableModal.hasAttribute("hidden")) return;
  if (e.key === "Escape") { e.preventDefault(); closeTableEditor(); }
  if (e.key === "Enter" && e.target.matches("#tbl-grid input")) {
    e.preventDefault();
    const r = +e.target.dataset.r, c = +e.target.dataset.c;
    const next = tableModal.querySelector(`input[data-r="${r + 1}"][data-c="${c}"]`);
    if (next) next.focus();
    else { document.getElementById("tbl-addrow").click(); }
  }
});

/* ============ Image editor (popup) — annotate(낙서) / align / size / delete ============ */
const imageModal = document.getElementById("image-modal");
const imgBaseEl = document.getElementById("img-prev");
const imgCanvas = document.getElementById("img-canvas");
const ictx = imgCanvas.getContext("2d", { willReadFrequently: true });
let imgState = null;      // { onApply, onDelete, onRewrite, align, width }
let imgUndo = [], imgDirty = false, iDrawing = false, iLX = 0, iLY = 0;

function openImageEditor(info, ops) {
  imgState = { onApply: ops.apply, onDelete: ops.remove, onRewrite: ops.rewrite,
               align: info.align || "", width: info.width || null };
  document.getElementById("img-caption").value = info.alt || "";
  imgBaseEl.alt = info.alt || "";
  // Re-size the overlay canvas to the image's DISPLAYED box (measured after
  // layout), so the drawable area covers exactly the whole visible image — no
  // natural-vs-display scaling gaps. Drawing happens in CSS px (DPR transform).
  imgBaseEl.onload = () => requestAnimationFrame(sizeAnnotCanvas);
  imgBaseEl.src = info.preview || "";
  // annotation only works when we can read the pixels back (data:/same-origin)
  const canAnnotate = /^data:/.test(info.preview || "");
  document.querySelector(".img-tools").style.display = canAnnotate ? "" : "none";
  imgCanvas.style.pointerEvents = canAnnotate ? "auto" : "none";
  drawColor = "#ff0039"; erasing = false; syncImgTools();
  document.querySelectorAll("#img-aligns button").forEach((b) =>
    b.classList.toggle("on", (b.dataset.al || "") === (info.align || "")));
  document.getElementById("img-delete").hidden = !ops.remove;
  imageModal.removeAttribute("hidden");
  // Size once the modal has actually laid out (double rAF), and on window resize.
  requestAnimationFrame(() => requestAnimationFrame(sizeAnnotCanvas));
}
function sizeAnnotCanvas() {
  if (imageModal.hasAttribute("hidden")) return;
  const r = imgBaseEl.getBoundingClientRect();
  if (!r.width || !r.height) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  imgCanvas.width = Math.max(1, Math.round(r.width * dpr));
  imgCanvas.height = Math.max(1, Math.round(r.height * dpr));
  ictx.setTransform(dpr, 0, 0, dpr, 0, 0);   // draw in CSS px
  imgClearCanvas(); imgUndo = []; imgDirty = false;
}
function imgClearCanvas() { ictx.save(); ictx.setTransform(1, 0, 0, 1, 0, 0); ictx.clearRect(0, 0, imgCanvas.width, imgCanvas.height); ictx.restore(); }
window.addEventListener("resize", () => { if (!imageModal.hasAttribute("hidden")) sizeAnnotCanvas(); });
function closeImageEditor() { imageModal.setAttribute("hidden", ""); imgState = null; if (ed) ed.focus(); }

// ---- annotation drawing on the overlay canvas (base image shows underneath) ----
// Coords are in CSS px (the context carries a DPR transform), so pointer maps 1:1.
function imgPos(e) {
  const r = imgCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function imgStroke() {
  ictx.lineCap = "round"; ictx.lineJoin = "round"; ictx.lineWidth = drawSize;
  ictx.globalCompositeOperation = erasing ? "destination-out" : "source-over";
  ictx.strokeStyle = erasing ? "rgba(0,0,0,1)" : drawColor; ictx.fillStyle = ictx.strokeStyle;
}
function imgPushUndo() { try { if (imgUndo.length > 25) imgUndo.shift(); imgUndo.push(ictx.getImageData(0, 0, imgCanvas.width, imgCanvas.height)); } catch (_) {} }
imgCanvas.addEventListener("pointerdown", (e) => {
  iDrawing = true; imgPushUndo(); imgDirty = true; const p = imgPos(e); iLX = p.x; iLY = p.y;
  imgStroke(); ictx.beginPath(); ictx.arc(p.x, p.y, Math.max(drawSize / 2, 0.5), 0, 7); ictx.fill();
  try { imgCanvas.setPointerCapture(e.pointerId); } catch (_) {}
});
imgCanvas.addEventListener("pointermove", (e) => {
  if (!iDrawing) return; const p = imgPos(e);
  imgStroke(); ictx.beginPath(); ictx.moveTo(iLX, iLY); ictx.lineTo(p.x, p.y); ictx.stroke(); iLX = p.x; iLY = p.y;
});
const iEnd = () => { iDrawing = false; };
imgCanvas.addEventListener("pointerup", iEnd);
imgCanvas.addEventListener("pointercancel", iEnd);
function syncImgTools() {
  document.querySelectorAll("#img-colors .sw").forEach((b) => b.classList.toggle("active", !erasing && b.dataset.color === drawColor));
  document.querySelectorAll("#img-sizes button").forEach((b) => b.classList.toggle("active", +b.dataset.size === drawSize));
  document.getElementById("img-eraser").classList.toggle("active", erasing);
}
document.querySelectorAll("#img-colors .sw").forEach((b) => { b.onclick = () => { drawColor = b.dataset.color; erasing = false; syncImgTools(); }; });
document.querySelectorAll("#img-sizes button").forEach((b) => { b.onclick = () => { drawSize = +b.dataset.size; syncImgTools(); }; });
document.getElementById("img-eraser").onclick = () => { erasing = !erasing; syncImgTools(); };
document.getElementById("img-undo").onclick = () => { const s = imgUndo.pop(); if (s) ictx.putImageData(s, 0, 0); };
document.getElementById("img-clear").onclick = () => { imgPushUndo(); imgClearCanvas(); imgDirty = imgUndo.length > 0; };

document.querySelectorAll("#img-aligns button").forEach((b) => {
  b.onclick = () => {
    if (!imgState) return;
    imgState.align = b.dataset.al || "";
    document.querySelectorAll("#img-aligns button").forEach((x) => x.classList.toggle("on", x === b));
  };
});
document.getElementById("img-cancel").onclick = closeImageEditor;
document.getElementById("img-apply").onclick = async () => {
  if (!imgState) return;
  const align = imgState.align || null, width = imgState.width || null;
  const caption = document.getElementById("img-caption").value.trim();
  // Annotated → flatten base image + strokes into a new PNG, save it, swap src.
  if (imgDirty) {
    try {
      const out = document.createElement("canvas");
      out.width = imgBaseEl.naturalWidth; out.height = imgBaseEl.naturalHeight;
      const octx = out.getContext("2d");
      octx.drawImage(imgBaseEl, 0, 0, out.width, out.height);
      octx.drawImage(imgCanvas, 0, 0, out.width, out.height);
      const dataUrl = out.toDataURL("image/png");
      const rewrite = imgState.onRewrite;
      await ensureDocSaved();
      const r = await api().save_drawing(dataUrl);
      if (r && r.path) { closeImageEditor(); if (rewrite) rewrite({ src: r.path, width, align, caption }); flash("낙서 저장됨"); return; }
      if (r && r.error) { flash(r.error); return; }
    } catch (e) { flash("낙서 저장 실패: " + e); return; }
  }
  const done = imgState.onApply; closeImageEditor(); if (done) done({ align, width, caption });
};
document.getElementById("img-delete").onclick = () => {
  if (!imgState) return;
  const done = imgState.onDelete; closeImageEditor(); if (done) done();
};
imageModal.addEventListener("mousedown", (e) => { if (e.target === imageModal) closeImageEditor(); });
document.addEventListener("keydown", (e) => {
  if (!imageModal.hasAttribute("hidden") && e.key === "Escape") { e.preventDefault(); closeImageEditor(); }
});
// Called by the editor when an image widget is clicked. `ops` = {apply, remove, rewrite}.
function editImageFromWidget(info, apply, remove, rewrite) {

/* ============ Front matter editor (popup) — Quarto YAML fields ============ */
// Parse the "---\n…\n---" block into known scalar fields + raw extras. A field
// is only lifted out when it's a simple inline scalar (not a nested block), so
// complex YAML (author lists, format:, …) is preserved verbatim in extras.
function parseFmSrc(src) {
  const inner = src.replace(/^---\r?\n/, "").replace(/\r?\n---\s*$/, "");
  const lines = inner.split(/\r?\n/);
  const f = { title: "", subtitle: "", author: "", date: "" }, extras = [];
  for (let i = 0; i < lines.length; i++) {
    const m = /^(title|subtitle|author|date)\s*:\s*(\S.*)$/.exec(lines[i]);
    const nextIndented = i + 1 < lines.length && /^\s+\S/.test(lines[i + 1]);
    if (m && !nextIndented && !f[m[1]]) f[m[1]] = m[2].replace(/^["']|["']$/g, "").trim();
    else extras.push(lines[i]);
  }

  fix(); setTimeout(fix, 80); setTimeout(fix, 300);

{

const ZOOM_STEPS = [0.6, 0.7, 0.8, 0.9, 1, 1.1, 1.25, 1.5, 1.75, 2, 2.5, 3];

  document.documentElement.style.setProperty("--qv-zoom", zoomLevel);

  localStorage.setItem("qv-zoom", String(zoomLevel));
}
function nudgeZoom(dir) {
  // snap to the nearest step, then move one step in `dir`.
  let i = ZOOM_STEPS.findIndex((s) => s >= zoomLevel - 1e-6);
  if (i < 0) i = ZOOM_STEPS.length - 1;
  if (dir > 0) i = Math.min(ZOOM_STEPS.length - 1, (ZOOM_STEPS[i] <= zoomLevel + 1e-6 ? i + 1 : i));
  else i = Math.max(0, (ZOOM_STEPS[i] >= zoomLevel - 1e-6 && ZOOM_STEPS[i] > zoomLevel - 1e-6 ? i - 1 : i));
  zoomLevel = ZOOM_STEPS[i]; applyZoom();
}

// between them merge or break — this guarantees they never touch. Caret lands on
// the blank line beneath the block.
function insertBlockText(blockText) {
  const view = ed.view; const sel = view.state.selection.main; const doc = view.state.doc;
  const line = doc.lineAt(sel.from);

  const prevBlank = line.from === 0 || doc.lineAt(line.from - 1).text.trim() === "";
  let lead = "";
  if (before.trim() !== "") lead = "\n\n";        // split off content on this line
  else if (!prevBlank) lead = "\n";               // caret at line start under content
  const text = lead + blockText + "\n\n";
  const anchor = sel.from + lead.length + blockText.length + 1;  // the blank line below
  view.dispatch({ changes: { from: sel.from, to: sel.to, insert: text }, selection: { anchor }, scrollIntoView: true });
  view.focus();
}
function insertImageMarkdown(path) { insertBlockText("![](" + path + ")"); }
// Crop to the drawn area (trim empty margins) but keep the drawing at the size
// it was drawn — big doodles stay big, small ones stay small.
function croppedDrawingDataUrl() {
  const w = drawCanvas.width, h = drawCanvas.height;
  const px = dctx.getImageData(0, 0, w, h).data;
  let minX = w, minY = h, maxX = -1, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (px[(y * w + x) * 4 + 3] !== 0) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) return null;  // nothing drawn
  const pad = 14;
  minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad); maxY = Math.min(h - 1, maxY + pad);
  const cw = maxX - minX + 1, ch = maxY - minY + 1;
  const out = document.createElement("canvas"); out.width = cw; out.height = ch;
  out.getContext("2d").drawImage(drawCanvas, minX, minY, cw, ch, 0, 0, cw, ch);
  return out.toDataURL("image/png");
}
async function insertDrawing() {
  const dataUrl = croppedDrawingDataUrl();
  if (!dataUrl) { flash("그림을 그려주세요"); return; }
  await ensureDocSaved();
  try {
    const r = await api().save_drawing(dataUrl);
    if (r && r.path) { insertImageMarkdown(r.path); flash("그림 저장됨 — " + describePath(r.path)); closeDrawModal(); }
    else if (r && r.error) { flash(r.error); }
  } catch (e) { flash("그림 저장 실패: " + e); }
}
reloadBtn.onclick = () => {
  const t = activeTab(); if (!t || !t.pending) return;
  loading = true; ed.setState(freshStateParked(t.pending.text)); loading = false;
  t.savedText = t.pending.text; t.title = t.pending.title; t.state = ed.getState();
  t.external = false; t.pending = null; activeTitle = t.title;
  reloadBtn.classList.remove("show"); statusEl.textContent = "";
  renderTabs();
};

// Links inside rendered widgets open in the external browser — never let a
// click navigate the app window away from the editor.
document.addEventListener("click", (e) => {
  const a = e.target.closest("a[href]");
  if (!a) return;
  // Programmatic download anchors (web export) must pass through — swallowing
  // them here was why web export silently produced no file.
  if (a.hasAttribute("download")) return;
  e.preventDefault();
  const href = a.getAttribute("href") || "";
  if (/^https?:/i.test(href)) { try { api().open_url(href); } catch (_) {} }
});

document.addEventListener("keydown", (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  const k = e.key.toLowerCase();
  // Tab management works regardless of editor focus.
  if (k === "w") { e.preventDefault(); if (activeId) closeTab(activeId); return; }
  if (e.key === "Tab" && tabs.length > 1) {   // Ctrl+Tab cycles tabs
    e.preventDefault();
    const i = tabs.findIndex((t) => t.id === activeId);
    const j = (i + (e.shiftKey ? -1 : 1) + tabs.length) % tabs.length;
    switchTo(tabs[j].id); return;
  }
  // ⌘E toggles source/preview (Obsidian convention). ⌘/ is left to CodeMirror's
  // line-comment toggle, where it conventionally belongs.
  if (k === "e") { e.preventDefault(); toggleSource(); return; }
  // Zoom (works regardless of editor focus): ⌘+ / ⌘= in, ⌘- out, ⌘0 reset.
  if (k === "=" || k === "+") { e.preventDefault(); nudgeZoom(1); return; }
  if (k === "-" || k === "_") { e.preventDefault(); nudgeZoom(-1); return; }
  if (k === "0") { e.preventDefault(); resetZoom(); return; }
  // Backup shortcuts for when focus is outside the editor (CM handles these when focused).
  if (ed && ed.view.hasFocus) return;
  if (k === "n") { e.preventDefault(); doNew(); }
  else if (k === "o") { e.preventDefault(); doOpen(); }
  else if (k === "s") { e.preventDefault(); doSave(); }
});

async function pollLoop() {
  try {
    const changed = await api().poll();   // array of changed docs, or null
    if (changed && changed.length) {
      for (const st of changed) {
        const t = tabs.find((x) => x.path === st.path);
        if (!t) continue;
        if (!isDirty(t)) {
          // No local edits — reload silently.
          if (t.id === activeId) {
            loading = true; ed.setState(freshStateParked(st.text)); loading = false;
            t.state = ed.getState();
          } else {
            t.state = freshStateParked(st.text);
          }
          t.savedText = st.text; t.title = st.title; t.external = false; t.pending = null;
        } else {
          // Local edits exist — flag the conflict, let the user choose.
          t.external = true; t.pending = st;
          if (t.id === activeId) { reloadBtn.classList.add("show"); statusEl.textContent = "⚠ 외부에서 파일이 바뀜"; }
        }
      }
      renderTabs();
    }
  } catch (_) {}
  setTimeout(pollLoop, 700);
}

window.addEventListener("pywebviewready", async () => {
  ed = QVEditor.create(document.getElementById("editor-host"), {
    doc: "",
    onChange: () => { if (!loading) { refreshActiveDirty(); scheduleAutosave(); } },
    onSave: doSave,
    onPdf: doExport,
    onOpen: doOpen,
    onNew: doNew,
    renderBlock, renderFrontmatter, resolveAsset, typeset, typesetSync, resolveImages: enhance,
    editTable: editTableFromWidget,
    editTabset: editTabsetFromWidget,
    editCallout: editCalloutFromWidget,
    editFrontmatter: editFrontmatterFromWidget,
    editImage: editImageFromWidget,
    settleCaret,
  });
  // ⌘V로 스크린샷/이미지 붙여넣기: 클립보드에 이미지가 있으면 활성 문서 옆
  // attachments/ 폴더에 저장하고 마크다운을 삽입한다 (텍스트 붙여넣기는 그대로).
  ed.view.contentDOM.addEventListener("paste", async () => {
    try {
      let r = await api().paste_image();
      // Image on the clipboard but the doc has no file yet → give it one and
      // retry, instead of flashing "먼저 문서를 저장하세요".
      if (r && r.error && !r.path && await ensureDocSaved()) {
        r = await api().paste_image();
      }
      if (r && r.path) {
        insertImageMarkdown(r.path);
        flash("이미지 저장됨 — " + describePath(r.path));
      } else if (r && r.error) {
        flash(r.error);
      }
    } catch (_) {}
  });

  const state = await api().get_state();
  if (state.path) addTab(state);              // launched with a file
  else doNew();                               // no file → blank document (Sublime-style)
  if (state.folder) openFolder(state.folder); // launched on a folder → add as root
  else renderEmptySidebar();                   // otherwise the explorer starts empty
  for (const p of pendingOpens.splice(0)) {
    if (typeof p === "string") window.QV.openPath(p);
    else if (p && p.folder) window.QV.openFolder(p.folder);
  }
  ed.focus();
  pollLoop();
  // Preload MathJax shortly after boot (local file): the first typed formula
  // then renders synchronously instead of racing the lazy load.
  setTimeout(() => { try { ensureMathJax(); } catch (_) {} }, 600);
});
</script>

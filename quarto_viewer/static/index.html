<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>푸르름</title>
<link rel="stylesheet" href="vendor/github.min.css" />
<link rel="stylesheet" href="doc.css" />
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 16px/1.75 var(--serif);
    color: var(--body); background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; align-items: center; gap: 3px;
    height: 48px; padding: 0 10px; flex: none;
    background: color-mix(in srgb, var(--toolbar) 90%, transparent);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    -webkit-user-select: none; user-select: none;
  }
  /* icon toolbar buttons */
  .tbtn {
    position: relative; display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; flex: none; padding: 0; cursor: pointer;
    color: var(--muted); background: transparent;
    border: 1px solid transparent; border-radius: 8px;
    transition: background .12s, color .12s, transform .06s;
  }
  .tbtn:hover { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
  .tbtn:active { transform: translateY(.5px); }
  .tbtn svg { width: 17px; height: 17px; }
  /* tooltip */
  .tbtn::after {
    content: attr(data-tip); position: absolute; top: 38px; left: 50%;
    transform: translateX(-50%) translateY(-3px); white-space: nowrap;
    font: 500 11px/1 -apple-system, system-ui, sans-serif; color: #f4f2e8;
    background: #2b2b26; padding: 5px 8px; border-radius: 6px;
    opacity: 0; pointer-events: none; transition: opacity .12s, transform .12s; z-index: 60;
  }
  .tbtn:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); transition-delay: .35s; }
  .tsep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; flex: none; }
  /* Left toolbar group pinned to the sidebar's width (232px + 1px border), so
     the tab strip begins exactly on the sidebar/editor split line below. */
  #tb-left {
    display: flex; align-items: center; gap: 3px;
    width: 223px; flex: none;   /* header has 10px left padding: 10+223 = 233 */
  }
  #status { color: var(--muted); font-size: 12px; white-space: nowrap; flex: none; margin-left: 6px; }
  #reload-btn {
    display: none; align-items: center; gap: 5px; flex: none; margin-left: 4px;
    font: 500 11.5px/1 -apple-system, system-ui, sans-serif;
    color: #fff; background: var(--caution); border: none;
    border-radius: 7px; padding: 6px 9px; cursor: pointer;
  }
  #reload-btn:hover { filter: brightness(1.05); }
  #reload-btn.show { display: inline-flex; }

  /* ---- tab strip ---- */
  #tabs {
    flex: 1; min-width: 0; display: flex; align-items: center; gap: 4px;
    overflow-x: auto; overflow-y: hidden; height: 100%; padding: 0 2px;
    scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }
  /* Tabs are floating pills, vertically centered in the toolbar. (The previous
     browser-style "open bottom" tab never actually reached the toolbar's bottom
     border, so its transparent bottom edge floated mid-air and looked crooked.) */
  .tab {
    display: inline-flex; align-items: center; gap: 6px; flex: none;
    max-width: 220px; height: 30px; padding: 0 6px 0 12px; cursor: default;
    font: 500 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--muted);
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; user-select: none;
  }
  .tab:hover { background: color-mix(in srgb, var(--hover) 70%, transparent); }
  .tab.active {
    color: var(--fg); background: var(--bg);
    border-color: var(--border);
  }
  .tab-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .tab.dirty .tab-name::before { content: "• "; color: var(--accent); font-weight: 700; }
  .tab.external .tab-name::after { content: " ⚠"; color: var(--caution); }
  .tab-close {
    flex: none; width: 17px; height: 17px; border: none; border-radius: 5px;
    background: transparent; color: var(--muted); cursor: pointer; padding: 0;
    font-size: 14px; line-height: 15px; opacity: .55;
  }
  .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--border); color: var(--fg); }

  #main { flex: 1; min-height: 0; display: flex; }
  #editor-host { flex: 1; min-height: 0; min-width: 0; display: flex; }
  #editor-host .cm-editor { flex: 1; }

  /* ---- sidebar file explorer ---- */
  #sidebar {
    width: 232px; flex: none; display: flex; flex-direction: column;
    background: color-mix(in srgb, var(--toolbar) 55%, var(--bg));
    border-right: 1px solid var(--border); overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #sidebar[hidden] { display: none; }
  /* No border-bottom here: it sat at a height nothing on the editor side
     matched, so the top-left junction showed three misaligned lines. */
  #sidebar-head {
    display: flex; align-items: center; gap: 6px; flex: none;
    padding: 12px 8px 6px 12px;
  }
  #sidebar-root {
    flex: 1; min-width: 0; font: 700 11px/1.2 -apple-system, system-ui, sans-serif;
    color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #sidebar-openbtn {
    flex: none; border: 1px solid var(--border-strong); border-radius: 6px;
    background: var(--bg); color: var(--muted); cursor: pointer;
    font: 500 10.5px/1 -apple-system, system-ui, sans-serif; padding: 4px 7px;
  }
  #sidebar-openbtn:hover { background: var(--hover); color: var(--fg); }
  #sidebar-tree { flex: 1; overflow: auto; padding: 4px 0 12px; }
  .sidebar-empty {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 40px 16px; text-align: center; color: var(--muted);
    font: 500 12px/1.5 -apple-system, system-ui, sans-serif;
  }
  .sidebar-empty button {
    border: 1px solid var(--border-strong); border-radius: 7px; background: var(--bg);
    color: var(--fg); cursor: pointer; font: 500 12px/1 inherit; padding: 7px 12px;
  }
  .sidebar-empty button:hover { background: var(--hover); }
  .tree-row {
    display: flex; align-items: center; gap: 4px; height: 26px; cursor: default;
    font: 500 12.5px/1 -apple-system, system-ui, sans-serif; color: var(--fg);
    white-space: nowrap; overflow: hidden; padding-right: 8px;
  }
  .tree-row:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
  .tree-row.active { background: color-mix(in srgb, var(--accent) 18%, transparent); color: var(--accent); }
  .tree-row .tw { width: 12px; flex: none; text-align: center; color: var(--muted); font-size: 9px; }
  .tree-row .ti { flex: none; opacity: .8; }
  .tree-row .tn { overflow: hidden; text-overflow: ellipsis; }
  .tree-row.dir { color: var(--fg); }

  /* ---- insert dropdown menu ---- */
  .menu {
    position: fixed; z-index: 100; min-width: 172px;
    background: var(--bg); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 5px; box-shadow: 0 10px 30px rgba(0,0,0,.16);
    font: 500 13px/1 -apple-system, system-ui, sans-serif;
  }
  .menu[hidden] { display: none; }
  .menu button {
    display: flex; align-items: center; gap: 9px; width: 100%;
    background: transparent; border: none; border-radius: 6px;
    padding: 7px 10px; cursor: pointer; color: var(--fg); text-align: left; font: inherit;
  }
  .menu button:hover { background: var(--hover); }
  .menu .mi {
    width: 16px; text-align: center; color: var(--muted);
    font-size: 12px; flex: none;
  }
  .menu .dot { width: 10px; height: 10px; border-radius: 3px; background: var(--d); flex: none; margin: 0 3px; }
  .menu-sep { height: 1px; background: var(--border); margin: 5px 4px; }
  .menu-label { font-size: 11px; color: var(--muted); padding: 5px 10px 3px; }

  /* ---- 그림판 팝업 ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 200; display: flex;
    align-items: center; justify-content: center;
    background: rgba(30,28,24,.38); backdrop-filter: blur(2px);
  }
  .overlay[hidden] { display: none; }
  .draw-panel {
    background: var(--toolbar); border: 1px solid var(--border-strong);
    border-radius: 14px; padding: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
    display: flex; flex-direction: column; gap: 10px; max-width: 94vw;
  }
  .draw-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .draw-colors { display: flex; gap: 5px; }
  .draw-colors .sw {
    width: 22px; height: 22px; border-radius: 50%; padding: 0; cursor: pointer;
    background: var(--c); border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border) inset;
  }
  .draw-colors .sw.active { border-color: var(--fg); }
  .draw-sizes { display: flex; gap: 3px; }
  .dtool, .draw-sizes button {
    font: 500 12px/1 -apple-system, system-ui, sans-serif; color: var(--fg);
    background: var(--bg); border: 1px solid var(--border-strong);
    border-radius: 7px; padding: 7px 10px; cursor: pointer; white-space: nowrap;
  }
  .dtool:hover, .draw-sizes button:hover { background: var(--hover); }
  .draw-sizes button.active, #draw-eraser.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .dtool.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dtool.primary:hover { filter: brightness(1.05); background: var(--accent); }
  .draw-tools .spacer { flex: 1; }
  .draw-surface {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; line-height: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 22px 22px; background-position: -1px -1px; background-color: #fff;
  }
  #draw-canvas { display: block; touch-action: none; cursor: crosshair; max-width: 88vw; height: auto; }


  /* Off-screen container used only to build the PDF export. */
  #export-doc { position: absolute; left: -99999px; top: 0; width: 820px; }

  /* Widget content must not inherit CodeMirror's pre-wrap: the \n text nodes in
     generated HTML (e.g. between a table's thead/tbody) would render as gaps. */
  .qv-block { white-space: normal; }

  /* Editor block-math widget layout (sizing comes from doc.css .math rules). */
  .qv-math-block { text-align: center; margin: 2px 0; }

  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(10px);
    background: #2b2b26; color: #f4f2e8; padding: 9px 16px; border-radius: 9px;
    font: 13px/1.4 var(--serif); opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 50; max-width: 80vw; box-shadow: 0 6px 24px rgba(0,0,0,.25);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    <!-- Fixed to the sidebar's width so the tab strip starts exactly at the

    <div id="tb-left">
    <button class="tbtn" id="btn-new" data-tip="새로 만들기  ⌘N">

      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9"/><path d="M13.7 2.5v3h-3"/></svg>

  </header>
  <div id="main">
    <aside id="sidebar">

  <!-- 그림판 팝업 -->

<script>
// ── Tauri adapter ──────────────────────────────────────────────────────────
// When running inside the Tauri (Rust) shell, expose the same window.pywebview
// .api surface the frontend already uses, mapped to Rust `invoke` commands.
// Inert under pywebview (window.__TAURI__ is undefined there).
if (window.__TAURI__) {
  const invoke = window.__TAURI__.core.invoke;
  const listen = window.__TAURI__.event.listen;
  window.pywebview = { api: {
    get_state: () => invoke("get_state"),
    read_path: (path) => invoke("read_path", { path }),
    help_doc: () => invoke("help_doc"),
    list_dir: (path) => invoke("list_dir", { path }),
    open_file: () => invoke("open_file"),
    open_folder: () => invoke("open_folder"),
    set_active: (path) => invoke("set_active", { path: path || "" }),
    set_folder: (path) => invoke("set_folder", { path: path || "" }),
    track: (paths) => invoke("track", { paths: paths || [] }),
    poll: () => invoke("poll"),
    save: (text) => invoke("save_doc", { text }),
    save_as: (text) => invoke("save_as", { text }),
    resolve_asset: (src) => invoke("resolve_asset", { src }),
    paste_image: () => invoke("paste_image"),
    save_drawing: (dataUrl) => invoke("save_drawing", { dataurl: dataUrl }),
    open_url: (url) => invoke("open_url", { url }),
    open_export: (html) => invoke("open_export", { html }),
  } };
  // Backend pushes opened files/folders from a second launch.
  listen("qv-open", (e) => window.QV && window.QV.openPath(e.payload));
  listen("qv-folder", (e) => window.QV && window.QV.openFolder && window.QV.openFolder(e.payload));
  listen("qv-new", () => window.QV && window.QV.newBlank && window.QV.newBlank());
  // Signal readiness the same way pywebview does.
  window.addEventListener("DOMContentLoaded", () => setTimeout(() => window.dispatchEvent(new Event("pywebviewready")), 0));
}
</script>
<script>
// ── Web (browser) adapter ──────────────────────────────────────────────────
// Running as a plain web page (no Tauri, no pywebview): provide the same
// window.pywebview.api surface backed by the File System Access API so the
// editor works in a browser (Chrome/Edge full; Safari read-only fallbacks).
// Gated: waits 400ms after DOMContentLoaded so a real pywebview backend, which
// injects window.pywebview itself, always wins.
if (!window.__TAURI__) window.addEventListener("DOMContentLoaded", () => setTimeout(() => {
  if (window.pywebview) return;   // real backend appeared → not web mode
  const fileHandles = new Map();  // path -> FileSystemFileHandle
  const dirHandles  = new Map();  // path -> FileSystemDirectoryHandle
  const mtimes      = new Map();  // path -> lastModified
  let activePath = "";
  const EXT = /\.(qmd|md|markdown)$/i;
  const stateOf = async (path, handle) => {
    const f = await handle.getFile();
    mtimes.set(path, f.lastModified);
    return { text: await f.text(), title: handle.name, path };
  };
  const parentDirOf = (path) => {
    const i = path.lastIndexOf("/");
    return i > 0 ? dirHandles.get(path.slice(0, i)) : null;
  };
  window.pywebview = { api: {
    get_state: async () => ({ text: "", title: "", path: "", folder: null }),
    help_doc: async () => ({ text: "# 푸르름 (웹)\n\n**열기** 버튼으로 `.qmd`/`.md` 파일을 엽니다. 편집·수식·콜아웃·저장(⌘S)이 동작합니다.\n\n> 웹 버전 제한: 이미지 붙여넣기·그림판 저장은 데스크톱 앱에서만 지원됩니다.", title: "도움말", path: "" }),
    read_path: async (path) => {
      const h = fileHandles.get(path);
      if (h) return stateOf(path, h);
      return { text: "> **파일을 읽을 수 없습니다:** " + path, title: path, path };
    },
    list_dir: async (path) => {
      const dir = dirHandles.get(path);
      if (!dir) return { path, name: path, entries: [] };
      const entries = [];
      for await (const [name, h] of dir.entries()) {
        if (name.startsWith(".")) continue;
        const p = path + "/" + name;
        if (h.kind === "directory") { dirHandles.set(p, h); entries.push({ name, path: p, is_dir: true }); }
        else if (EXT.test(name)) { fileHandles.set(p, h); entries.push({ name, path: p, is_dir: false }); }
      }
      entries.sort((a, b) => (a.is_dir !== b.is_dir) ? (a.is_dir ? -1 : 1) : a.name.localeCompare(b.name));
      return { path, name: dir.name, entries };
    },
    open_file: async () => {
      try {
        if (window.showOpenFilePicker) {

// Cheap update of just the active tab's dirty dot (avoids a full rebuild per keystroke).
function refreshActiveDirty() {
  const t = activeTab(); if (!t) return;
  const el = document.querySelector('.tab[data-id="' + t.id + '"]');
  if (el) el.classList.toggle("dirty", isDirty(t));
}

function switchTo(id) {
  if (id === activeId) { ed.focus(); return; }
  const cur = activeTab();
  if (cur) { cur.state = ed.getState(); cur.scrollTop = ed.view.scrollDOM.scrollTop; }
  const t = tabs.find((x) => x.id === id);
  if (!t) return;
  activeId = id;
  loading = true; ed.setState(t.state); loading = false;
  activeTitle = t.title;
  try { api().set_active(t.path || ""); } catch (_) {}
  reloadBtn.classList.toggle("show", !!t.external);
  statusEl.textContent = t.external ? "⚠ 외부에서 파일이 바뀜" : "";
  renderTabs();
  if (typeof markActiveInTree === "function") markActiveInTree();
  const top = t.scrollTop || 0;
  requestAnimationFrame(() => { ed.view.scrollDOM.scrollTop = top; });
  ed.focus();
}

function addTab(st) {
  if (st.path) { const ex = tabs.find((t) => t.path === st.path); if (ex) { switchTo(ex.id); return ex; } }
  const t = {
    id: ++seq, path: st.path || "", title: st.title,
    state: freshStateParked(st.text), savedText: st.text,
    scrollTop: 0, external: false, pending: null,
  };
  tabs.push(t);
  syncTrack();
  switchTo(t.id);
  return t;
}

function closeTab(id) {
  const idx = tabs.findIndex((t) => t.id === id);
  if (idx < 0) return;
  const t = tabs[idx];
  if (isDirty(t) && !confirm("저장되지 않은 변경사항이 있습니다:\n" + t.title + "\n\n닫을까요?")) return;
  tabs.splice(idx, 1);
  if (activeId === id) {
    activeId = null;  // so switchTo doesn't try to persist the removed tab
    const next = tabs[idx] || tabs[idx - 1] || null;
    if (next) switchTo(next.id);
    else openWelcome();
  } else {
    renderTabs();
  }
  syncTrack();
}

async function openWelcome() {
  try { addTab(await api().read_path("")); } catch (_) {}
}

function syncTrack() {
  try { api().track(tabs.map((t) => t.path).filter(Boolean)); } catch (_) {}
}

// Starter document for 새로 만들기 — an untitled tab (no file until first save).
const NEW_DOC = '---\ntitle: "제목 없음"\n---\n\n';
function doNew() { addTab({ text: NEW_DOC, title: "제목 없음", path: "" }); }

/* ============ Insert blocks (Quarto syntax) ============ */
// A « » token marks where the cursor lands after insertion (stripped before insert).
const CURSOR = "\u00ab\u00bb";
const SNIPPETS = {
  "table": "| 열 1 | 열 2 |\n| --- | --- |\n| «» |  |\n",
  "tabset": "::: {.panel-tabset}\n\n## 탭 1\n\n«»\n\n## 탭 2\n\n\n:::\n",
  "code": "```python\n«»\n```\n",
  "callout-note": "::: {.callout-note}\n«»\n:::\n",
  "callout-tip": "::: {.callout-tip}\n«»\n:::\n",
  "callout-warning": "::: {.callout-warning}\n«»\n:::\n",
  "callout-caution": "::: {.callout-caution}\n«»\n:::\n",
  "callout-important": "::: {.callout-important}\n«»\n:::\n",
};
function insertBlock(key) {
  const snip = SNIPPETS[key]; if (!snip || !ed) return;
  const view = ed.view;
  const sel = view.state.selection.main;
  // Block markup needs to start on its own line (blank line above if mid-text).
  const line = view.state.doc.lineAt(sel.from);
  const before = view.state.doc.sliceString(line.from, sel.from);
  const lead = before.trim() === "" ? "" : "\n\n";
  const marker = snip.indexOf(CURSOR);
  const clean = snip.replace(CURSOR, "");
  const caret = sel.from + lead.length + (marker >= 0 ? marker : clean.length);
  view.dispatch({
    changes: { from: sel.from, to: sel.to, insert: lead + clean },
    selection: { anchor: caret },
    scrollIntoView: true,
  });
  view.focus();
}

async function doOpen() {
  try { const s = await api().open_file(); if (s) { addTab(s); maybeRevealFolder(s.path); } }
  catch (e) { console.error("open failed", e); }
}
async function doSave() {
  const t = activeTab(); if (!t) return;
  const text = ed.getValue();
  try {
    const r = await api().save(text);
    if (r && r.saved) {
      t.savedText = text; t.path = r.path; t.title = r.title;
      t.external = false; t.pending = null; activeTitle = r.title;
      statusEl.textContent = ""; reloadBtn.classList.remove("show");
      syncTrack(); renderTabs();
      flash("저장됨 — " + r.title);
    } else if (r && r.error) flash("저장 실패: " + r.error);
  } catch (e) { flash("저장 실패: " + e); }
}

/* ============ Sidebar file explorer ============ */
const sidebarEl = document.getElementById("sidebar");
// The folder currently shown in the explorer. Opening a file auto-reveals its
// folder here (only if none is open yet), so there's no separate "open folder"
// step for the common case — you just 열기 a file and its folder appears.
let sidebarFolder = null;
function maybeRevealFolder(path) {
  if (!path || sidebarFolder) return;
  const i = Math.max(path.lastIndexOf("/"), path.lastIndexOf("\\"));
  if (i > 0) openFolder(path.slice(0, i));
}
function markActiveInTree() {
  const t = activeTab();
  const p = t ? t.path : "";
  document.querySelectorAll("#sidebar-tree .tree-row.file").forEach((r) => {
    r.classList.toggle("active", !!p && r.dataset.path === p);
  });
}
function treeIcon(isDir) {
  return isDir
    ? '<svg class="ti" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1.5 4.5 1.5 12.5a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1V6a1 1 0 0 0-1-1H7.5l-1.3-1.5H2.5a1 1 0 0 0-1 1Z"/></svg>'
    : '<svg class="ti" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3.5 1.5h6l3 3v9a1 1 0 0 1-1 1h-8a1 1 0 0 1-1-1V2.5a1 1 0 0 1 1-1Z"/><path d="M9.3 1.6V4.7h3.1"/></svg>';
}
function makeTreeNode(entry, depth) {
  const wrap = document.createElement("div");
  const row = document.createElement("div");
  row.className = "tree-row " + (entry.is_dir ? "dir" : "file");
  row.dataset.path = entry.path;
  row.style.paddingLeft = 6 + depth * 13 + "px";
  const tw = document.createElement("span"); tw.className = "tw"; tw.textContent = entry.is_dir ? "▸" : "";
  const name = document.createElement("span"); name.className = "tn"; name.textContent = entry.name;
  row.appendChild(tw);
  row.insertAdjacentHTML("beforeend", treeIcon(entry.is_dir));
  row.appendChild(name);
  wrap.appendChild(row);
  if (entry.is_dir) {
    const kids = document.createElement("div"); kids.hidden = true; wrap.appendChild(kids);
    let loaded = false;
    row.onclick = async () => {
      if (!kids.hidden) { kids.hidden = true; tw.textContent = "▸"; return; }
      if (!loaded) {
        try {
          const sub = await api().list_dir(entry.path);
          for (const c of sub.entries || []) kids.appendChild(makeTreeNode(c, depth + 1));
          loaded = true;
        } catch (_) {}
      }
      kids.hidden = false; tw.textContent = "▾";
    };
  } else {
    row.onclick = () => { (async () => { try { addTab(await api().read_path(entry.path)); markActiveInTree(); } catch (_) {} })(); };
  }
  return wrap;
}
async function openFolder(path) {
  try {
    sidebarFolder = path;
    try { api().set_folder(path); } catch (_) {}  // so Save defaults into this folder
    const info = await api().list_dir(path);
    document.getElementById("sidebar-root").textContent = info.name || path;
    const tree = document.getElementById("sidebar-tree");
    tree.innerHTML = "";
    for (const e of info.entries || []) tree.appendChild(makeTreeNode(e, 0));
    sidebarEl.removeAttribute("hidden");
    markActiveInTree();
  } catch (_) {}
}
function renderEmptySidebar() {
  document.getElementById("sidebar-root").textContent = "탐색기";
  const tree = document.getElementById("sidebar-tree");
  tree.innerHTML = "";
  const box = document.createElement("div"); box.className = "sidebar-empty";
  box.appendChild(Object.assign(document.createElement("div"), { textContent: "파일을 열면 그 폴더가 여기 표시됩니다" }));
  tree.appendChild(box);
}
async function doOpenFolder() {
  try { const r = await api().open_folder(); if (r && r.folder) openFolder(r.folder); }
  catch (_) {}
}
// No folder-open button at all: opening a file (열기 / ⌘O) automatically reveals
// its folder in the explorer, so there's a single "열기" action and no separate
// folder-open step. doOpenFolder/open_folder stay defined but unused.

// Backend (single-instance server) hands Finder-opened files/folders here.
window.QV = {
  openPath(path) {
    if (!ed) { pendingOpens.push(path); return; }
    (async () => { try { addTab(await api().read_path(path)); maybeRevealFolder(path); } catch (_) {} })();
  },
  openFolder(path) { if (ed) openFolder(path); else pendingOpens.push({ folder: path }); },
  newBlank() { if (ed) doNew(); },
};

let toastTimer = null;
function flash(msg) {
  const el = document.getElementById("toast"); el.textContent = msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}

document.getElementById("btn-new").onclick = doNew;
document.getElementById("btn-open").onclick = doOpen;
document.getElementById("btn-save").onclick = doSave;
document.getElementById("btn-pdf").onclick = doPdf;
async function doHelp() {
  const existing = tabs.find((t) => t.title === "푸르름 도움말");
  if (existing) { switchTo(existing.id); return; }
  try { addTab(await api().help_doc()); } catch (_) {}
}
document.getElementById("btn-help").onclick = doHelp;

// Insert menu (콜아웃·표·탭셋 …)
const insertBtn = document.getElementById("btn-insert");
const insertMenu = document.getElementById("insert-menu");
function closeInsertMenu() { insertMenu.setAttribute("hidden", ""); }
insertBtn.onclick = (e) => {
  e.stopPropagation();
  if (!insertMenu.hasAttribute("hidden")) { closeInsertMenu(); return; }
  const r = insertBtn.getBoundingClientRect();
  insertMenu.style.left = Math.round(r.left) + "px";
  insertMenu.style.top = Math.round(r.bottom + 5) + "px";
  insertMenu.removeAttribute("hidden");
};
insertMenu.querySelectorAll("button[data-snip]").forEach((b) => {
  b.onclick = () => {
    closeInsertMenu();
    if (b.dataset.snip === "draw") openDrawModal();
    else insertBlock(b.dataset.snip);
  };
});
document.addEventListener("click", (e) => {
  if (e.target !== insertBtn && !insertBtn.contains(e.target) && !insertMenu.contains(e.target)) closeInsertMenu();
});

/* ============ 그림판 (canvas paint popup) ============ */
const drawModal = document.getElementById("draw-modal");
const drawCanvas = document.getElementById("draw-canvas");
const dctx = drawCanvas.getContext("2d", { willReadFrequently: true });
let drawColor = "#2b2b26", drawSize = 5, erasing = false, drawing = false, dLastX = 0, dLastY = 0;
const undoStack = [];

function drawPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (drawCanvas.width / r.width), y: (e.clientY - r.top) * (drawCanvas.height / r.height) };
}
function drawStyle() {
  dctx.lineCap = "round"; dctx.lineJoin = "round"; dctx.lineWidth = drawSize;
  dctx.globalCompositeOperation = erasing ? "destination-out" : "source-over";
  dctx.strokeStyle = erasing ? "rgba(0,0,0,1)" : drawColor;
  dctx.fillStyle = dctx.strokeStyle;
}
function pushUndo() { try { if (undoStack.length > 25) undoStack.shift(); undoStack.push(dctx.getImageData(0, 0, drawCanvas.width, drawCanvas.height)); } catch (_) {} }
drawCanvas.addEventListener("pointerdown", (e) => {
  drawing = true; pushUndo(); const p = drawPos(e); dLastX = p.x; dLastY = p.y;
  drawStyle(); dctx.beginPath(); dctx.arc(p.x, p.y, Math.max(drawSize / 2, 0.5), 0, 7); dctx.fill();
  try { drawCanvas.setPointerCapture(e.pointerId); } catch (_) {}
});
drawCanvas.addEventListener("pointermove", (e) => {
  if (!drawing) return; const p = drawPos(e);
  drawStyle(); dctx.beginPath(); dctx.moveTo(dLastX, dLastY); dctx.lineTo(p.x, p.y); dctx.stroke();
  dLastX = p.x; dLastY = p.y;
});
const endStroke = () => { drawing = false; };
drawCanvas.addEventListener("pointerup", endStroke);
drawCanvas.addEventListener("pointercancel", endStroke);

function syncDrawTools() {
  document.querySelectorAll("#draw-colors .sw").forEach((b) => b.classList.toggle("active", !erasing && b.dataset.color === drawColor));
  document.querySelectorAll("#draw-sizes button").forEach((b) => b.classList.toggle("active", +b.dataset.size === drawSize));
  document.getElementById("draw-eraser").classList.toggle("active", erasing);
}
document.getElementById("draw-colors").querySelectorAll(".sw").forEach((b) => {
  b.onclick = () => { drawColor = b.dataset.color; erasing = false; syncDrawTools(); };
});
document.getElementById("draw-sizes").querySelectorAll("button").forEach((b) => {
  b.onclick = () => { drawSize = +b.dataset.size; syncDrawTools(); };
});
document.getElementById("draw-eraser").onclick = () => { erasing = !erasing; syncDrawTools(); };
document.getElementById("draw-undo").onclick = () => { const s = undoStack.pop(); if (s) dctx.putImageData(s, 0, 0); };
document.getElementById("draw-clear").onclick = () => { pushUndo(); dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); };
document.getElementById("draw-cancel").onclick = closeDrawModal;
document.getElementById("draw-insert").onclick = insertDrawing;
syncDrawTools();
// Close on backdrop click or Escape.
drawModal.addEventListener("mousedown", (e) => { if (e.target === drawModal) closeDrawModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !drawModal.hasAttribute("hidden")) { e.preventDefault(); closeDrawModal(); } });

function openDrawModal() {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  undoStack.length = 0; erasing = false; syncDrawTools();
  drawModal.removeAttribute("hidden");
}
function closeDrawModal() { drawModal.setAttribute("hidden", ""); if (ed) ed.focus(); }

function insertImageMarkdown(path) {
  const view = ed.view; const sel = view.state.selection.main;
  const line = view.state.doc.lineAt(sel.from);
  const before = view.state.doc.sliceString(line.from, sel.from);
  const lead = before.trim() === "" ? "" : "\n\n";
  const text = lead + "![](" + path + ")\n";
  view.dispatch({ changes: { from: sel.from, to: sel.to, insert: text }, selection: { anchor: sel.from + text.length }, scrollIntoView: true });
  view.focus();
}
// Crop to the drawn area (trim empty margins) but keep the drawing at the size
// it was drawn — big doodles stay big, small ones stay small.
function croppedDrawingDataUrl() {
  const w = drawCanvas.width, h = drawCanvas.height;
  const px = dctx.getImageData(0, 0, w, h).data;
  let minX = w, minY = h, maxX = -1, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (px[(y * w + x) * 4 + 3] !== 0) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) return null;  // nothing drawn
  const pad = 14;
  minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
  maxX = Math.min(w - 1, maxX + pad); maxY = Math.min(h - 1, maxY + pad);
  const cw = maxX - minX + 1, ch = maxY - minY + 1;
  const out = document.createElement("canvas"); out.width = cw; out.height = ch;
  out.getContext("2d").drawImage(drawCanvas, minX, minY, cw, ch, 0, 0, cw, ch);
  return out.toDataURL("image/png");
}
async function insertDrawing() {
  const dataUrl = croppedDrawingDataUrl();
  if (!dataUrl) { flash("그림을 그려주세요"); return; }
  try {
    const r = await api().save_drawing(dataUrl);
    if (r && r.path) { insertImageMarkdown(r.path); flash("그림 저장됨 — " + r.path); closeDrawModal(); }
    else if (r && r.error) { flash(r.error); }
  } catch (e) { flash("그림 저장 실패: " + e); }
}
reloadBtn.onclick = () => {
  const t = activeTab(); if (!t || !t.pending) return;
  loading = true; ed.setState(freshStateParked(t.pending.text)); loading = false;
  t.savedText = t.pending.text; t.title = t.pending.title; t.state = ed.getState();
  t.external = false; t.pending = null; activeTitle = t.title;
  reloadBtn.classList.remove("show"); statusEl.textContent = "";
  renderTabs();
};

// Links inside rendered widgets open in the external browser — never let a
// click navigate the app window away from the editor.
document.addEventListener("click", (e) => {
  const a = e.target.closest("a[href]");
  if (!a) return;
  e.preventDefault();
  const href = a.getAttribute("href") || "";
  if (/^https?:/i.test(href)) { try { api().open_url(href); } catch (_) {} }
});

document.addEventListener("keydown", (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  const k = e.key.toLowerCase();
  // Tab management works regardless of editor focus.
  if (k === "w") { e.preventDefault(); if (activeId) closeTab(activeId); return; }
  if (e.key === "Tab" && tabs.length > 1) {   // Ctrl+Tab cycles tabs
    e.preventDefault();
    const i = tabs.findIndex((t) => t.id === activeId);
    const j = (i + (e.shiftKey ? -1 : 1) + tabs.length) % tabs.length;
    switchTo(tabs[j].id); return;
  }
  // Backup shortcuts for when focus is outside the editor (CM handles these when focused).
  if (ed && ed.view.hasFocus) return;
  if (k === "n") { e.preventDefault(); doNew(); }
  else if (k === "o") { e.preventDefault(); doOpen(); }
  else if (k === "s") { e.preventDefault(); doSave(); }
  else if (k === "p") { e.preventDefault(); doPdf(); }
});

async function pollLoop() {
  try {
    const changed = await api().poll();   // array of changed docs, or null
    if (changed && changed.length) {
      for (const st of changed) {
        const t = tabs.find((x) => x.path === st.path);
        if (!t) continue;
        if (!isDirty(t)) {
          // No local edits — reload silently.
          if (t.id === activeId) {
            loading = true; ed.setState(freshStateParked(st.text)); loading = false;
            t.state = ed.getState();
          } else {
            t.state = freshStateParked(st.text);
          }
          t.savedText = st.text; t.title = st.title; t.external = false; t.pending = null;
        } else {
          // Local edits exist — flag the conflict, let the user choose.
          t.external = true; t.pending = st;
          if (t.id === activeId) { reloadBtn.classList.add("show"); statusEl.textContent = "⚠ 외부에서 파일이 바뀜"; }
        }
      }
      renderTabs();
    }
  } catch (_) {}
  setTimeout(pollLoop, 700);
}

window.addEventListener("pywebviewready", async () => {
  ed = QVEditor.create(document.getElementById("editor-host"), {
    doc: "",
    onChange: () => { if (!loading) refreshActiveDirty(); },
    onSave: doSave,
    onPdf: doPdf,
    onOpen: doOpen,
    onNew: doNew,
    renderBlock, renderFrontmatter, resolveAsset, typeset, typesetSync, resolveImages: enhance,
  });
  // ⌘V로 스크린샷/이미지 붙여넣기: 클립보드에 이미지가 있으면 활성 문서 옆
  // attachments/ 폴더에 저장하고 마크다운을 삽입한다 (텍스트 붙여넣기는 그대로).
  ed.view.contentDOM.addEventListener("paste", async () => {
    try {
      const r = await api().paste_image();
      if (r && r.path) {
        ed.view.dispatch(ed.view.state.replaceSelection("![](" + r.path + ")"));
        flash("이미지 저장됨 — " + r.path);
      } else if (r && r.error) {
        flash(r.error);
      }
    } catch (_) {}
  });

  const state = await api().get_state();
  if (state.path) addTab(state);              // launched with a file
  else doNew();                               // no file → blank document (Sublime-style)
  if (state.folder) openFolder(state.folder); // launched on a folder → show the tree
  else { renderEmptySidebar(); if (state.path) maybeRevealFolder(state.path); } // else reveal the file's folder
  for (const p of pendingOpens.splice(0)) {
    if (typeof p === "string") window.QV.openPath(p);
    else if (p && p.folder) window.QV.openFolder(p.folder);
  }
  ed.focus();
  pollLoop();
});
</script>
